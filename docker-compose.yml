version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: recibe_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recibe_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recibe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional pgAdmin for GUI database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: recibe_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@recibe.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5051:80'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
